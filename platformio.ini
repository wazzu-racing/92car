; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = teensy
name = car26
description = Wazzu Racing 2026 Car 92 Embedded Code

[env:teensy]
platform = teensy
board = teensy41
framework = arduino
build_src_filter = +<teensy/*>
lib_deps =
	adafruit/Adafruit BusIO@^1.17.4
	https://github.com/bolderflight/bmi088-arduino
	https://github.com/mantonakakis1/MegaCAN
	https://github.com/adafruit/Adafruit_MCP9600
	sparkfun/SparkFun u-blox GNSS Arduino Library@^2.2.28
	adafruit/Adafruit GFX Library@^1.12.6
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
	adafruit/Adafruit ImageReader Library@^2.10.0
lib_compat_mode = soft
build_flags = -D SD_FAT_TYPE=3

[env:dashboard]
platform = teensy
board = teensy41
framework = arduino
build_src_filter = +<dashboard/*>
lib_compat_mode = soft
build_flags = -D SD_FAT_TYPE=3
lib_deps =
    blasilli/GBALib Potentiometer@^1.0.0

[env:radio_car]
platform = atmelavr
board = feather32u4
framework = arduino
build_src_filter = +<radio_car/*>
lib_deps =
	mikem/RadioHead@^1.120
	sparkfun/SparkFun u-blox Arduino Library@^1.8.11

[env:radio_telemetry]
platform = atmelavr
board = feather32u4
framework = arduino
build_src_filter = +<radio_telemetry/*>
lib_deps =
	mikem/RadioHead@^1.120
	sparkfun/SparkFun u-blox Arduino Library@^1.8.11
